name: Build CI Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/gr4-ci
  TARGET_PLATFORMS: linux/amd64,linux/arm64

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      bases: ${{ steps.matrix.outputs.bases }}
      profiles: ${{ steps.matrix.outputs.profiles }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          root = Path("builders")
          owner = os.environ["GITHUB_REPOSITORY_OWNER"].lower()

          bases = []
          for dockerfile in sorted(root.glob("*/base/Dockerfile")):
              distro = dockerfile.parts[1]
              bases.append({
                  "distro": distro,
                  "context": f"builders/{distro}",
                  "dockerfile": f"builders/{distro}/base/Dockerfile",
                  "image": f"ghcr.io/{owner}/gr4-ci/{distro}-base",
              })

          profiles = []
          for dockerfile in sorted(root.glob("*/profiles/*/Dockerfile")):
              distro = dockerfile.parts[1]
              profile = dockerfile.parts[3]
              profiles.append({
                  "distro": distro,
                  "profile": profile,
                  "context": f"builders/{distro}",
                  "dockerfile": f"builders/{distro}/profiles/{profile}/Dockerfile",
                  "base_image": f"ghcr.io/{owner}/gr4-ci/{distro}-base",
                  "image": f"ghcr.io/{owner}/gr4-ci/{distro}-{profile}",
              })

          print(f"bases={json.dumps({'include': bases})}")
          print(f"profiles={json.dumps({'include': profiles})}")
          PY

  build-base:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.bases) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.TARGET_PLATFORMS }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-profile:
    needs:
      - discover
      - build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.profiles) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.TARGET_PLATFORMS }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}:latest
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
